name: Lighthouse CI

on:
  repository_dispatch:
    types: [vercel-deploy]
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

run-name: >
  ${{ github.event_name == 'repository_dispatch' && 'Lighthouse CI — triggered by Vercel deploy' ||
      github.event_name == 'workflow_dispatch' && 'Lighthouse CI — manual run' ||
      'Lighthouse CI — nightly run' }}

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse on all pages
        run: |
          mkdir -p reports
          URLS=(
            "https://manuelaklenke.com"
            "https://manuelaklenke.com/about"
            "https://manuelaklenke.com/portfolio"
            "https://manuelaklenke.com/events"
            "https://manuelaklenke.com/contact"
          )
          for URL in "${URLS[@]}"; do
            SLUG=$(echo "$URL" | sed 's|https://manuelaklenke.com||' | sed 's|/||g')
            SLUG=${SLUG:-home}
            echo "Running Lighthouse on $URL -> reports/$SLUG.json"
            lighthouse "$URL" \
              --output=json \
              --output-path="reports/$SLUG.json" \
              --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
              --quiet || echo "Lighthouse failed for $URL"
          done
          ls -la reports/

      - name: Generate HTML report
        if: always()
        run: |
          mkdir -p public
          node -e "
          const fs = require('fs');
          const path = require('path');

          const reportsDir = './reports';
          const files = fs.readdirSync(reportsDir).filter(f => f.endsWith('.json'));

          if (files.length === 0) {
            fs.writeFileSync('public/index.html', '<html><body><h1>Lighthouse CI Report</h1><p>No report data available.</p></body></html>');
            process.exit(0);
          }

          const results = files.map(file => {
            const data = JSON.parse(fs.readFileSync(path.join(reportsDir, file), 'utf8'));
            const url = data.finalUrl || data.requestedUrl || file.replace('.json', '');
            const cats = data.categories;
            return {
              url,
              performance: Math.round((cats.performance?.score ?? 0) * 100),
              accessibility: Math.round((cats.accessibility?.score ?? 0) * 100),
              bestPractices: Math.round((cats['best-practices']?.score ?? 0) * 100),
              seo: Math.round((cats.seo?.score ?? 0) * 100),
            };
          }).sort((a, b) => a.url.localeCompare(b.url));

          const scoreClass = s => s >= 90 ? 'good' : s >= 70 ? 'average' : 'poor';

          const rows = results.map(r => \`
            <tr>
              <td>\${r.url.replace('https://manuelaklenke.com', '') || '/'}</td>
              <td class=\"\${scoreClass(r.performance)}\">\${r.performance}</td>
              <td class=\"\${scoreClass(r.accessibility)}\">\${r.accessibility}</td>
              <td class=\"\${scoreClass(r.bestPractices)}\">\${r.bestPractices}</td>
              <td class=\"\${scoreClass(r.seo)}\">\${r.seo}</td>
            </tr>\`).join('');

          const html = \`<!DOCTYPE html>
          <html><head><meta charset=\"UTF-8\"><title>Lighthouse CI Report</title>
          <style>
            body{font-family:sans-serif;margin:40px;background:#f5f5f5}
            h1{color:#333}
            table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)}
            th{background:#37474f;color:#fff;padding:12px 16px;text-align:left}
            td{padding:10px 16px;border-bottom:1px solid #eee;font-weight:bold}
            td:first-child{font-weight:normal}
            tr:hover{background:#f9f9f9}
            .good{color:#4caf50}
            .average{color:#ff9800}
            .poor{color:#f44336}
            .legend{display:flex;gap:16px;margin:16px 0;font-size:.9em}
            .legend span{padding:4px 12px;border-radius:4px;font-weight:bold}
            .legend .good{background:#4caf50;color:#fff}
            .legend .average{background:#ff9800;color:#fff}
            .legend .poor{background:#f44336;color:#fff}
          </style></head>
          <body>
          <h1>Lighthouse CI Report — manuelaklenke.com</h1>
          <p>Generated: \${new Date().toUTCString()}</p>
          <div class=\"legend\">
            <span class=\"good\">90–100 Good</span>
            <span class=\"average\">70–89 Needs improvement</span>
            <span class=\"poor\">0–69 Poor</span>
          </div>
          <table>
            <thead><tr><th>Page</th><th>Performance</th><th>Accessibility</th><th>Best Practices</th><th>SEO</th></tr></thead>
            <tbody>\${rows}</tbody>
          </table>
          </body></html>\`;

          fs.writeFileSync('public/index.html', html);
          console.log('Report generated with ' + results.length + ' pages.');
          "

      - name: Write job summary
        if: always()
        run: |
          echo "## Lighthouse CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Link |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 HTML Report | [GitHub Pages](https://georget88.github.io/manuelaklenke-lighthouse-ci/) |" >> $GITHUB_STEP_SUMMARY

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
